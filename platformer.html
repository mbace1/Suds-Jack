<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Eeri Platformer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
canvas { display: block; image-rendering: pixelated; }
#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#score-display {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  color: #fff; font-family: monospace; font-size: 18px; font-weight: bold;
  text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 20;
  display: flex; gap: 24px;
}
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.82); display: flex; flex-direction: column;
  justify-content: center; align-items: center; z-index: 50;
  color: #fff; font-family: monospace;
}
#overlay h1 { font-size: 2.5rem; color: #f7c948; text-shadow: 3px 3px 0 #c44; margin-bottom: 6px; }
#overlay p { font-size: 0.95rem; color: #ccc; margin-bottom: 6px; text-align: center; }
#overlay p.hint { font-size: 0.8rem; color: #888; }
#theme-label { font-size: 0.85rem; color: #aaa; margin-top: 16px; margin-bottom: 8px; }
.theme-btn {
  padding: 12px 28px; font-size: 1rem; font-family: monospace;
  border: 2px solid transparent; border-radius: 8px;
  cursor: pointer; font-weight: bold; letter-spacing: 0.5px;
  transition: transform 0.08s, box-shadow 0.08s;
}
.theme-btn:active { transform: scale(0.95); }
#btn-classic  { background: #c03020; color: #fff; box-shadow: 0 4px 0 #801000; }
#btn-classic:hover  { background: #d84030; }
#btn-traffic  { background: #FF6B00; color: #fff; box-shadow: 0 4px 0 #b04800; }
#btn-traffic:hover  { background: #ff8820; }

/* On-screen controls */
#controls {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 160px;
  pointer-events: none; z-index: 30; display: flex; justify-content: space-between; align-items: flex-end;
  padding: 0 24px 24px;
}
#stick-zone {
  width: 120px; height: 120px; position: relative;
  pointer-events: all;
}
#stick-base {
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.25);
  position: absolute; top: 0; left: 0;
}
#stick-nub {
  width: 50px; height: 50px; border-radius: 50%;
  background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.8);
  position: absolute; top: 35px; left: 35px;
  transition: none;
}
#buttons {
  display: flex; gap: 16px; align-items: flex-end;
  pointer-events: all;
}
.btn {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: monospace; font-weight: bold; font-size: 1rem;
  border: 2px solid rgba(255,255,255,0.4); cursor: pointer;
  user-select: none; -webkit-user-select: none;
  transition: transform 0.05s, opacity 0.05s;
  color: #fff; text-shadow: 1px 1px 0 #000;
}
.btn:active, .btn.pressed { transform: scale(0.9); opacity: 0.8; }
#btn-jump { background: rgba(50, 180, 50, 0.6); border-color: rgba(255,255,255,0.6); }
#btn-run  { background: rgba(255, 150, 0, 0.6); border-color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score-display">
  <span id="s-score">SCORE: 0</span>
  <span id="s-lives">❤ x 3</span>
  <span id="s-coins">🪙 0</span>
</div>

<div id="controls">
  <div id="stick-zone">
    <div id="stick-base"></div>
    <div id="stick-nub"></div>
  </div>
  <div id="buttons">
    <div class="btn" id="btn-run">B</div>
    <div class="btn" id="btn-jump">A</div>
  </div>
</div>

<div id="overlay">
  <h1>EERI</h1>
  <p>Collect coins &bull; Stomp enemies &bull; Reach the end!</p>
  <p class="hint">Arrow keys / WASD &bull; Space to jump &bull; Hold for higher &bull; Shift to run</p>
  <div id="theme-label">Choose your style:</div>
  <div style="display:flex;gap:16px;">
    <button class="theme-btn" id="btn-classic">🍄 Classic</button>
    <button class="theme-btn" id="btn-traffic">🚦 Traffic Park</button>
  </div>
</div>

<script>
'use strict';

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TILE = 32;
let W, H, SCALE;

function resize() {
  const sw = window.innerWidth, sh = window.innerHeight;
  SCALE = Math.min(sw / 480, sh / 270);
  W = 480; H = 270;
  canvas.width = W; canvas.height = H;
  canvas.style.width  = (W * SCALE) + 'px';
  canvas.style.height = (H * SCALE) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

const input = { left: false, right: false, jump: false, run: false, jumpPressed: false };
let prevJump = false;

function gatherInput() {
  input.left  = keys['ArrowLeft']  || keys['KeyA'];
  input.right = keys['ArrowRight'] || keys['KeyD'];
  input.run   = keys['ShiftLeft']  || keys['ShiftRight'] || keys['KeyZ'] || touchRun;
  const j     = keys['ArrowUp'] || keys['Space'] || keys['KeyW'] || keys['KeyX'] || touchJump;
  input.jumpPressed = j && !prevJump;
  input.jump  = j;
  prevJump = j;

  // joystick override
  if (Math.abs(stickX) > 0.3) {
    input.left  = stickX < -0.3;
    input.right = stickX >  0.3;
  }
}

// ── On-screen stick ───────────────────────────────────────────────────────────
let stickX = 0, stickActive = false, stickId = null;
let stickOriginX = 0, stickOriginY = 0;
let touchJump = false, touchRun = false;
const nub = document.getElementById('stick-nub');
const stickZone = document.getElementById('stick-zone');
const STICK_R = 35;

function stickPos(cx, cy) {
  const rect = stickZone.getBoundingClientRect();
  const ox = rect.left + 60, oy = rect.top + 60;
  let dx = cx - ox, dy = cy - oy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > STICK_R) { dx *= STICK_R/dist; dy *= STICK_R/dist; }
  stickX = dx / STICK_R;
  nub.style.left = (35 + dx) + 'px';
  nub.style.top  = (35 + dy) + 'px';
}

stickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (stickId === null) { stickId = t.identifier; stickPos(t.clientX, t.clientY); }
  }
}, { passive: false });
stickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === stickId) stickPos(t.clientX, t.clientY);
  }
}, { passive: false });
stickZone.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === stickId) { stickId = null; stickX = 0; nub.style.left = '35px'; nub.style.top = '35px'; }
  }
}, { passive: false });

function wireBtn(id, setter) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); setter(true);  el.classList.add('pressed'); },    { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); setter(false); el.classList.remove('pressed'); }, { passive: false });
  el.addEventListener('touchcancel',e => { e.preventDefault(); setter(false); el.classList.remove('pressed'); }, { passive: false });
}
wireBtn('btn-jump', v => touchJump = v);
wireBtn('btn-run',  v => touchRun  = v);

// ── Level data ────────────────────────────────────────────────────────────────
// Level is a tile map. 0=air, 1=ground, 2=brick, 3=question block, 4=pipe-top, 5=pipe-body
// Coins are stored separately. Enemies separately.

const LEVEL_W = 80; // tiles wide
const LEVEL_H = 9;  // tiles tall (H/TILE = 270/32 ≈ 8.4)

function buildLevel() {
  const map = [];
  for (let r = 0; r < LEVEL_H; r++) map.push(new Array(LEVEL_W).fill(0));

  // Ground
  for (let c = 0; c < LEVEL_W; c++) map[LEVEL_H-1][c] = 1;

  // Gaps: 1 tile wide — jumpable at normal walking pace
  const gaps = [[22,23],[40,41],[57,58],[71,72]];
  for (const [a,b] of gaps) for (let c = a; c < b; c++) map[LEVEL_H-1][c] = 0;

  // Platforms: 3-4 tiles wide, at row 5 (3 tiles above ground) or row 6 (2 tiles up)
  // [c_start, c_end_exclusive, row]
  const platforms = [
    [5, 9, 6],   // early gentle step-up
    [13,17, 5],  // slightly higher
    [19,23, 6],  // leads to gap
    [25,30, 6],  // wide safe landing
    [33,37, 5],
    [39,44, 6],  // wide, spans the gap area
    [47,51, 5],
    [53,58, 6],  // leads to gap
    [60,64, 5],
    [66,72, 6],  // long safe stretch
    [73,78, 5],  // final approach
  ];
  for (const [c1,c2,row] of platforms) {
    for (let c = c1; c < c2; c++) map[row][c] = 2;
  }

  // Question blocks — above platforms, reachable with a good jump
  for (const c of [7,15,21,27,35,41,49,55,62,68,75]) map[4][c] = 3;

  // Traffic lights — decorative road furniture
  for (const c of [11,31,51,64]) map[LEVEL_H-2][c] = 4;

  return map;
}

function buildCoins(map) {
  const coins = [];
  // Stars on the ground in safe early stretch
  for (const c of [3,4,5]) coins.push({ cx: c*TILE+16, cy: (LEVEL_H-2)*TILE+4, collected: false });
  // Stars floating above platforms
  const platStars = [
    [6,5],[7,5],[8,5],
    [14,4],[15,4],[16,4],
    [20,5],[21,5],
    [26,5],[27,5],[28,5],
    [34,4],[35,4],
    [40,5],[41,5],[42,5],
    [48,4],[49,4],
    [54,5],[55,5],
    [61,4],[62,4],[63,4],
    [67,5],[68,5],[69,5],
    [74,4],[75,4],[76,4],
  ];
  for (const [c,r] of platStars) {
    if (!map[r][c]) coins.push({ cx: c*TILE+16, cy: r*TILE+8, collected: false });
  }
  return coins;
}

function buildEnemies() {
  const enemies = [];
  // 8 cones total — none in first 12 tiles, none adjacent to gaps
  // Ground cones: [col, 7] lands on ground row 8
  // Platform cones: [col, row-1] lands on platform row below
  const positions = [
    [15, 7], [29, 7], [45, 7], [59, 7], // ground patrol
    [7,  5], [26, 5], [48, 5], [70, 5], // platform patrol (row 6 platforms)
  ];
  for (const [c,r] of positions) {
    enemies.push({
      x: c*TILE, y: r*TILE,
      vx: -26, vy: 0,  // slower — more manageable for kids
      onGround: false, alive: true, dying: false, dyingTimer: 0,
      w: TILE, h: TILE,
    });
  }
  return enemies;
}

// ── Physics constants ─────────────────────────────────────────────────────────
const GRAVITY         = 900;
const JUMP_VEL        = -280;
const JUMP_HOLD_ACCEL = 1100; // net upward boost while button held
const JUMP_HOLD_MAX   = 0.22; // seconds of hold boost available
const WALK_SPEED = 110;
const RUN_SPEED  = 190;
const FRICTION   = 0.7;
const MAX_FALL   = 600;

// ── Game state ────────────────────────────────────────────────────────────────
let state, map, coins, enemies, player, camera, score, lives, coinCount;
let qBlockData; // tracks hit question blocks

function initGame() {
  map = buildLevel();
  qBlockData = {};
  coins = buildCoins(map);
  enemies = buildEnemies();
  score = 0;
  lives = 3;
  coinCount = 0;

  player = {
    x: 2*TILE, y: (LEVEL_H-2)*TILE - TILE,
    vx: 0, vy: 0,
    w: 22, h: 28,
    onGround: false,
    facingRight: true,
    jumpBuffer: 0,
    coyoteTime: 0,
    jumpHoldTime: 0,
    walkFrame: 0, walkTimer: 0,
    invincible: 0,
    dead: false, deadTimer: 0,
  };
  camera = { x: 0 };
  updateHUD();
}

function tileAt(c, r) {
  if (c < 0 || c >= LEVEL_W || r < 0 || r >= LEVEL_H) return (r >= LEVEL_H) ? 1 : 0;
  return map[r][c];
}

function isSolid(t) { return t === 1 || t === 2 || t === 3 || t === 4 || t === 5; }

// AABB vs tilemap resolution
function moveEntity(ent, dx, dy) {
  // X pass
  ent.x += dx;
  const c1 = Math.floor(ent.x / TILE);
  const c2 = Math.floor((ent.x + ent.w - 1) / TILE);
  const r1 = Math.floor(ent.y / TILE);
  const r2 = Math.floor((ent.y + ent.h - 1) / TILE);
  for (let r = r1; r <= r2; r++) {
    for (let c = c1; c <= c2; c++) {
      if (isSolid(tileAt(c, r))) {
        if (dx > 0) { ent.x = c * TILE - ent.w; ent.vx = 0; }
        else if (dx < 0) { ent.x = (c + 1) * TILE; ent.vx = 0; }
      }
    }
  }

  // Y pass
  ent.y += dy;
  const c1y = Math.floor(ent.x / TILE);
  const c2y = Math.floor((ent.x + ent.w - 1) / TILE);
  const r1y = Math.floor(ent.y / TILE);
  const r2y = Math.floor((ent.y + ent.h - 1) / TILE);
  ent.onGround = false;
  for (let r = r1y; r <= r2y; r++) {
    for (let c = c1y; c <= c2y; c++) {
      const t = tileAt(c, r);
      if (isSolid(t)) {
        if (dy > 0) {
          ent.y = r * TILE - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        } else if (dy < 0) {
          ent.y = (r + 1) * TILE;
          ent.vy = 0;
          // Hit block from below
          hitBlockFromBelow(c, r);
        }
      }
    }
  }
}

function hitBlockFromBelow(c, r) {
  const t = map[r][c];
  if (t === 3 && !qBlockData[`${c},${r}`]) {
    qBlockData[`${c},${r}`] = true;
    map[r][c] = 2; // used up
    score += 100;
    updateHUD();
    coins.push({ cx: c*TILE+16, cy: r*TILE-10, collected: false, pop: 1, popVy: -120 });
  } else if (t === 2) {
    map[r][c] = 0; // break it
    score += 50;
    updateHUD();
    // Brick debris: 4 chunks fly outward
    const bx = c*TILE+TILE/2, by = r*TILE+TILE/2;
    const colors = ['#e03020','#fff','#e03020','#ccc'];
    for (let i = 0; i < 4; i++) {
      const side = i < 2 ? -1 : 1;
      particles.push({
        x: bx + side*6, y: by,
        vx: side*(60 + Math.random()*80),
        vy: -260 - Math.random()*120,
        life: 0.7, maxLife: 0.7,
        color: colors[i], size: 6,
      });
    }
  }
}

let particles = [];
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i / n) + Math.random() * 0.3;
    const s = 60 + Math.random() * 80;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 40, life: 0.7, maxLife: 0.7, color });
  }
}

let flagReached = false;
const FLAG_X = (LEVEL_W - 3) * TILE;

function updateHUD() {
  document.getElementById('s-score').textContent = 'SCORE: ' + score;
  document.getElementById('s-lives').textContent = (theme==='traffic' ? '🚲' : '❤') + ' x ' + lives;
  document.getElementById('s-coins').textContent = (theme==='traffic' ? '⭐' : '🪙') + ' ' + coinCount;
}

// ── Update ────────────────────────────────────────────────────────────────────
let lastTime = 0;

function update(dt) {
  if (state !== 'play') return;

  gatherInput();

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 300 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Pop coins (from question blocks)
  for (const coin of coins) {
    if (coin.pop) {
      coin.cy += coin.popVy * dt;
      coin.popVy += 400 * dt;
      if (coin.popVy > 0 && coin.cy > coin._originY) { coin.pop = 0; coin._originY = undefined; }
      if (!coin._originY) coin._originY = coin.cy;
    }
  }

  // Player death
  if (player.dead) {
    player.deadTimer -= dt;
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (player.deadTimer <= 0) {
      lives--;
      if (lives <= 0) { state = 'gameover'; showOverlay('GAME OVER', 'You ran out of lives!'); return; }
      initGame(); state = 'play'; return;
    }
    updateHUD();
    return;
  }

  if (player.invincible > 0) player.invincible -= dt;

  // Player movement
  const spd = input.run ? RUN_SPEED : WALK_SPEED;
  const acc = player.onGround ? 1000 : 500;
  const targetVx = input.right ? spd : input.left ? -spd : 0;

  if (targetVx !== 0) {
    player.vx += (targetVx - player.vx) * Math.min(1, acc * dt / Math.abs(targetVx - player.vx + 0.001));
    player.facingRight = targetVx > 0;
  } else {
    player.vx *= Math.pow(FRICTION, dt * 10);
    if (Math.abs(player.vx) < 2) player.vx = 0;
  }

  // Jump buffering
  if (input.jumpPressed) player.jumpBuffer = 0.12;
  if (player.jumpBuffer > 0) player.jumpBuffer -= dt;
  if (player.onGround) player.coyoteTime = 0.1;
  else if (player.coyoteTime > 0) player.coyoteTime -= dt;

  if (player.jumpBuffer > 0 && player.coyoteTime > 0) {
    player.vy = JUMP_VEL;
    player.jumpBuffer = 0;
    player.coyoteTime = 0;
    player.jumpHoldTime = JUMP_HOLD_MAX;
  }
  // Hold to jump higher: extra upward force while button held
  if (input.jump && player.jumpHoldTime > 0 && player.vy < 0) {
    player.vy -= JUMP_HOLD_ACCEL * dt;
    player.jumpHoldTime -= dt;
  } else if (!input.jump) {
    player.jumpHoldTime = 0;
    // Cut the jump short on early release
    if (player.vy < -80) player.vy += 1600 * dt;
  }

  player.vy += GRAVITY * dt;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  moveEntity(player, player.vx * dt, player.vy * dt);

  // Walk animation
  if (player.onGround && Math.abs(player.vx) > 5) {
    player.walkTimer += dt;
    if (player.walkTimer > 0.1) { player.walkTimer = 0; player.walkFrame = (player.walkFrame + 1) % 3; }
  } else if (player.onGround) { player.walkFrame = 0; }

  // Fall death
  if (player.y > LEVEL_H * TILE + 64) killPlayer();

  // Enemies
  for (const en of enemies) {
    if (!en.alive) continue;
    if (en.dying) {
      en.dyingTimer -= dt;
      if (en.dyingTimer <= 0) en.alive = false;
      continue;
    }
    en.vy += GRAVITY * dt;
    if (en.vy > MAX_FALL) en.vy = MAX_FALL;
    moveEntity(en, en.vx * dt, en.vy * dt);
    // Reverse at walls / edges
    const fc = Math.floor((en.x + (en.vx > 0 ? en.w : 0)) / TILE);
    const fr = Math.floor((en.y + en.h + 1) / TILE);
    if (!isSolid(tileAt(fc, fr)) || en.vx === 0) en.vx = -en.vx;
    if (en.y > LEVEL_H * TILE) en.alive = false;
  }

  // Player ↔ enemy collisions
  if (player.invincible <= 0) {
    for (const en of enemies) {
      if (!en.alive || en.dying) continue;
      if (rectsOverlap(player, en)) {
        // Stomp if falling onto enemy
        if (player.vy > 50 && player.y + player.h < en.y + en.h * 0.55) {
          en.dying = true; en.dyingTimer = 0.3;
          player.vy = JUMP_VEL * 0.55;
          score += 200;
          spawnParticles(en.x + en.w/2, en.y + en.h/2, '#f90', 8);
          updateHUD();
        } else {
          killPlayer();
        }
      }
    }
  }

  // Coin collection
  for (const coin of coins) {
    if (coin.collected) continue;
    if (Math.abs(player.x + player.w/2 - coin.cx) < 20 && Math.abs(player.y + player.h/2 - coin.cy) < 20) {
      coin.collected = true;
      coinCount++;
      score += 50;
      spawnParticles(coin.cx, coin.cy, '#FFD700', 8);
      updateHUD();
    }
  }

  // Flag
  if (!flagReached && player.x + player.w > FLAG_X) {
    flagReached = true;
    score += 1000;
    updateHUD();
    setTimeout(() => { state = 'win'; showOverlay('YOU WIN!', 'Final score: ' + score); }, 1200);
  }

  // Camera
  const targetCamX = player.x - W/2 + player.w/2;
  camera.x += (targetCamX - camera.x) * Math.min(1, dt * 8);
  camera.x = Math.max(0, Math.min(camera.x, LEVEL_W * TILE - W));
}

function killPlayer() {
  if (player.dead || player.invincible > 0) return;
  player.dead = true;
  player.deadTimer = 2.0;
  player.vy = JUMP_VEL * 0.9;
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
let theme = 'classic'; // 'classic' | 'traffic'

// ── Classic tile / sprite / enemy / flag ─────────────────────────────────────
function drawTileClassic(t, px, py, c, r) {
  const x = px, y = py;
  if (t === 1) {
    ctx.fillStyle = '#5a3e1b'; ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = '#4caf50'; ctx.fillRect(x, y, TILE, 6);
    ctx.fillStyle = '#3a2a0e';
    for (let i = 0; i < 3; i++) { const ox = (c*7+i*11)%(TILE-4); ctx.fillRect(x+ox, y+8, 4, 2); }
  } else if (t === 2) {
    ctx.fillStyle = '#b05a28'; ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = '#8a3a10';
    ctx.fillRect(x,y,TILE,2); ctx.fillRect(x,y,2,TILE);
    ctx.fillRect(x+TILE-2,y,2,TILE); ctx.fillRect(x,y+TILE-2,TILE,2);
    ctx.fillRect(x+TILE/2-1,y,2,TILE); ctx.fillRect(x,y+TILE/2-1,TILE,2);
  } else if (t === 3) {
    ctx.fillStyle = '#f7c948'; ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = '#c8941c';
    ctx.fillRect(x,y,TILE,3); ctx.fillRect(x,y,3,TILE);
    ctx.fillRect(x+TILE-3,y,3,TILE); ctx.fillRect(x,y+TILE-3,TILE,3);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
    ctx.fillText('?', x+TILE/2, y+TILE-8);
  } else if (t === 4) {
    ctx.fillStyle = '#2e9e2e'; ctx.fillRect(x-2, y, TILE+4, TILE);
    ctx.fillStyle = '#4ecb4e'; ctx.fillRect(x, y+2, 6, TILE-4); ctx.fillRect(x-2, y, TILE+4, 8);
  } else if (t === 5) {
    ctx.fillStyle = '#2e9e2e'; ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = '#4ecb4e'; ctx.fillRect(x+2, y, 6, TILE);
  }
}

function drawPlayerSpriteClassic(cx, cy, frame) {
  ctx.fillStyle = '#c03020'; ctx.fillRect(cx-8,cy,16,7); ctx.fillRect(cx-11,cy+4,22,4);
  ctx.fillStyle = '#f5c49a'; ctx.fillRect(cx-8,cy+8,16,10);
  ctx.fillStyle = '#222'; ctx.fillRect(cx+2,cy+10,3,3);
  ctx.fillStyle = '#5a2e00'; ctx.fillRect(cx-5,cy+14,10,3);
  ctx.fillStyle = '#4090e0'; ctx.fillRect(cx-8,cy+18,16,10);
  ctx.fillStyle = '#c03020'; ctx.fillRect(cx-6,cy+19,12,7);
  ctx.fillStyle = '#4a3a1a';
  if (frame===0) { ctx.fillRect(cx-7,cy+28,6,8); ctx.fillRect(cx+1,cy+28,6,8); }
  else if (frame===1) { ctx.fillRect(cx-7,cy+28,6,10); ctx.fillRect(cx+1,cy+28,6,6); }
  else { ctx.fillRect(cx-7,cy+28,6,6); ctx.fillRect(cx+1,cy+28,6,10); }
  ctx.fillStyle = '#c03020';
  if (frame===0) { ctx.fillRect(cx-8,cy+36,8,4); ctx.fillRect(cx,cy+36,8,4); }
  else if (frame===1) { ctx.fillRect(cx-8,cy+38,8,4); ctx.fillRect(cx,cy+34,8,4); }
  else { ctx.fillRect(cx-8,cy+34,8,4); ctx.fillRect(cx,cy+38,8,4); }
}

function drawEnemyClassic(en) {
  const ex = Math.round(en.x - camera.x), ey = Math.round(en.y);
  ctx.save();
  if (en.dying) {
    ctx.globalAlpha = en.dyingTimer / 0.3;
    ctx.translate(ex+en.w/2, ey+en.h/2);
    ctx.scale(1, -0.2 + en.dyingTimer/0.3*0.8);
    ctx.translate(-(ex+en.w/2), -(ey+en.h/2));
  }
  ctx.fillStyle = '#c04040';
  ctx.beginPath(); ctx.ellipse(ex+16,ey+16,13,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#a02020';
  const ft = en.vx < 0 ? 0 : 1;
  ctx.beginPath(); ctx.ellipse(ex+8+ft*4,ey+24,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ex+20-ft*4,ey+24,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(ex+6,ey+8,6,6); ctx.fillRect(ex+20,ey+8,6,6);
  ctx.fillStyle = '#222';
  ctx.fillRect(ex+(en.vx<0?7:8),ey+10,3,3); ctx.fillRect(ex+(en.vx<0?21:22),ey+10,3,3);
  ctx.fillStyle = '#700';
  ctx.fillRect(ex+5,ey+6,8,2); ctx.fillRect(ex+19,ey+6,8,2);
  ctx.restore();
}

function drawFlagClassic(camX) {
  const fx = FLAG_X - camX;
  ctx.fillStyle = '#888'; ctx.fillRect(fx+4, (LEVEL_H-7)*TILE, 4, 6*TILE);
  ctx.fillStyle = '#e04040';
  ctx.beginPath();
  ctx.moveTo(fx+8, (LEVEL_H-7)*TILE+4);
  ctx.lineTo(fx+28,(LEVEL_H-7)*TILE+14);
  ctx.lineTo(fx+8, (LEVEL_H-7)*TILE+24);
  ctx.fill();
}

function drawBackgroundClassic(t) {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a0a2e'); grad.addColorStop(1,'#2a1a4e');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  for (let i = 0; i < 5; i++) {
    const cx2 = ((i*120 + t*8) % (W+80)) - 40, cy2 = 30 + i*30;
    ctx.beginPath(); ctx.ellipse(cx2,cy2,35,18,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+25,cy2-8,25,14,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2-20,cy2-5,20,12,0,0,Math.PI*2); ctx.fill();
  }
}

function drawCoinClassic(cx2, cy, now) {
  ctx.fillStyle = '#f7c948';
  const bob = Math.sin(now*3 + cx2*0.1)*2;
  ctx.beginPath(); ctx.ellipse(cx2, cy+bob, 7, 7, now*1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff8';
  ctx.beginPath(); ctx.ellipse(cx2-2, cy+bob-2, 2, 3, 0.4, 0, Math.PI*2); ctx.fill();
}

// ── Traffic Park tile / sprite / enemy / flag ─────────────────────────────────
function drawTileTraffic(t, px, py, c, r) {
  const x = px, y = py;
  if (t === 1) {
    ctx.fillStyle = '#5a5a5a'; ctx.fillRect(x,y,TILE,TILE);
    ctx.fillStyle = '#5cb85c'; ctx.fillRect(x,y,TILE,5);
    if (c%3===0) { ctx.fillStyle='#FFD700'; ctx.fillRect(x+4,y+16,24,4); }
    ctx.fillStyle = '#ddd'; ctx.fillRect(x,y+TILE-3,TILE,2);
  } else if (t === 2) {
    ctx.fillStyle = '#bbb'; ctx.fillRect(x,y,TILE,TILE);
    for (let i=0;i<5;i++) { ctx.fillStyle=i%2===0?'#e03020':'#fff'; ctx.fillRect(x+i*7,y+2,7,TILE-4); }
    ctx.fillStyle='#ddd'; ctx.fillRect(x,y,TILE,4);
    ctx.fillStyle='#888'; ctx.fillRect(x,y+TILE-3,TILE,3);
  } else if (t === 3) {
    ctx.fillStyle='#999'; ctx.fillRect(x+14,y+12,4,TILE-12);
    ctx.save(); ctx.translate(x+TILE/2,y+14); ctx.rotate(Math.PI/4);
    ctx.fillStyle='#FFD700'; ctx.fillRect(-9,-9,18,18); ctx.restore();
    ctx.fillStyle='#111'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('!',x+TILE/2,y+20);
  } else if (t === 4) {
    ctx.fillStyle='#888'; ctx.fillRect(x+13,y,6,TILE);
    ctx.fillStyle='#222'; ctx.fillRect(x+6,y+1,20,28);
    ctx.fillStyle='#333'; ctx.fillRect(x+7,y+2,18,26);
    const phase=Math.floor(Date.now()/3000)%2;
    ctx.fillStyle=phase===0?'#ff2020':'#400';
    ctx.beginPath(); ctx.ellipse(x+16,y+8,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#440'; ctx.beginPath(); ctx.ellipse(x+16,y+16,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=phase===1?'#20e040':'#040';
    ctx.beginPath(); ctx.ellipse(x+16,y+24,5,5,0,0,Math.PI*2); ctx.fill();
  } else if (t === 5) {
    ctx.fillStyle='#888'; ctx.fillRect(x+13,y,6,TILE);
    ctx.fillStyle='#aaa'; ctx.fillRect(x+14,y,3,TILE);
  }
}

function drawPlayerSpriteTraffic(cx, cy, frame) {
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(cx-7,cy+27,8,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#888'; ctx.beginPath(); ctx.ellipse(cx-7,cy+27,5,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#444'; ctx.beginPath(); ctx.ellipse(cx-7,cy+27,2,2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(cx+9,cy+27,8,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#888'; ctx.beginPath(); ctx.ellipse(cx+9,cy+27,5,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#444'; ctx.beginPath(); ctx.ellipse(cx+9,cy+27,2,2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#d03020';
  ctx.fillRect(cx-7,cy+18,16,3); ctx.fillRect(cx-7,cy+18,3,10); ctx.fillRect(cx+7,cy+18,3,10);
  const pa=frame*1.1;
  ctx.fillStyle='#555'; ctx.fillRect(cx-2+Math.round(Math.cos(pa)*4),cy+21+Math.round(Math.sin(pa)*3),5,3);
  ctx.fillStyle='#444'; ctx.fillRect(cx+6,cy+13,2,7); ctx.fillRect(cx+3,cy+13,8,2);
  ctx.fillStyle='#88cc22'; ctx.fillRect(cx-6,cy+8,14,10);
  ctx.fillStyle='#f5c49a'; ctx.fillRect(cx+5,cy+10,6,4);
  ctx.fillStyle='#f5c49a'; ctx.fillRect(cx-5,cy+2,11,8);
  ctx.fillStyle='#222'; ctx.fillRect(cx+1,cy+4,3,3);
  ctx.fillStyle='#d04060'; ctx.fillRect(cx-2,cy+8,5,1);
  ctx.fillStyle='#FF6B00';
  ctx.beginPath(); ctx.ellipse(cx,cy+3,8,7,0,Math.PI,Math.PI*2); ctx.fill();
  ctx.fillRect(cx-8,cy+2,17,4);
  ctx.fillStyle='#cc4400'; ctx.fillRect(cx-8,cy+4,17,2);
  ctx.fillStyle='#ffaa55'; ctx.fillRect(cx-4,cy+1,4,2);
}

function drawEnemyTraffic(en) {
  const ex=Math.round(en.x-camera.x), ey=Math.round(en.y);
  ctx.save();
  if (en.dying) {
    const p=1-en.dyingTimer/0.3;
    ctx.translate(ex+en.w/2,ey+en.h-2); ctx.scale(1+p*0.6,1-p*0.85); ctx.translate(-(ex+en.w/2),-(ey+en.h-2));
  }
  ctx.fillStyle='#FF6B00';
  ctx.beginPath(); ctx.moveTo(ex+2,ey+TILE-2); ctx.lineTo(ex+TILE-2,ey+TILE-2);
  ctx.lineTo(ex+TILE/2+3,ey+TILE/2+2); ctx.lineTo(ex+TILE/2-3,ey+TILE/2+2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ex+TILE/2-3,ey+TILE/2+2); ctx.lineTo(ex+TILE/2+3,ey+TILE/2+2);
  ctx.lineTo(ex+TILE/2+1,ey+3); ctx.lineTo(ex+TILE/2-1,ey+3); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(ex+5,ey+TILE-8); ctx.lineTo(ex+TILE-5,ey+TILE-8);
  ctx.lineTo(ex+TILE-7,ey+TILE-14); ctx.lineTo(ex+7,ey+TILE-14); ctx.fill();
  ctx.strokeStyle='#a33300'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ex+2,ey+TILE-2); ctx.lineTo(ex+TILE/2,ey+3); ctx.lineTo(ex+TILE-2,ey+TILE-2); ctx.closePath(); ctx.stroke();
  if (!en.dying) {
    ctx.fillStyle='#fff'; ctx.fillRect(ex+10,ey+TILE-10,4,4); ctx.fillRect(ex+17,ey+TILE-10,4,4);
    ctx.fillStyle='#222'; ctx.fillRect(ex+11+(en.vx<0?0:1),ey+TILE-9,2,2); ctx.fillRect(ex+18+(en.vx<0?0:1),ey+TILE-9,2,2);
  }
  ctx.restore();
}

function drawStar(cx, cy, r) {
  ctx.beginPath();
  for (let i=0;i<5;i++) {
    const a=(i*4*Math.PI/5)-Math.PI/2, b=((i*4+2)*Math.PI/5)-Math.PI/2;
    if(i===0) ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.lineTo(cx+Math.cos(b)*r*0.42,cy+Math.sin(b)*r*0.42);
  }
  ctx.closePath(); ctx.fill();
}

function drawFlagTraffic(camX) {
  const fx=FLAG_X-camX;
  ctx.fillStyle='#888'; ctx.fillRect(fx+4,(LEVEL_H-7)*TILE,4,6*TILE);
  ctx.fillStyle='#fff'; ctx.fillRect(fx+8,(LEVEL_H-7)*TILE,36,22);
  ctx.fillStyle='#000'; ctx.font='bold 6px monospace'; ctx.textAlign='center';
  ctx.fillText('FINISH',fx+26,(LEVEL_H-7)*TILE+10);
  for (let row=0;row<2;row++) for (let col=0;col<6;col++)
    if((row+col)%2===0) { ctx.fillStyle='#000'; ctx.fillRect(fx+8+col*6,(LEVEL_H-7)*TILE+12+row*5,6,5); }
}

function drawBackgroundTraffic(t) {
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#5bc8f5'); grad.addColorStop(1,'#c8ecff');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#FFE000'; ctx.beginPath(); ctx.ellipse(W-45,32,20,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF0A0'; ctx.beginPath(); ctx.ellipse(W-45,32,13,13,0,0,Math.PI*2); ctx.fill();
  const bscroll=-camera.x*0.15;
  const houses=[[20,55,30],[90,45,25],[150,60,35],[210,50,28],[270,58,32],[330,42,22],[390,55,30],[450,48,28]];
  for (const [hx,hh,hw] of houses) {
    const rx=((bscroll+hx*2)%(W+60))-30;
    ctx.fillStyle='#b0cce0'; ctx.fillRect(rx,H-hh-22,hw,hh);
    ctx.fillStyle='#e06060'; ctx.beginPath();
    ctx.moveTo(rx-3,H-hh-22); ctx.lineTo(rx+hw/2,H-hh-40); ctx.lineTo(rx+hw+3,H-hh-22); ctx.fill();
    ctx.fillStyle='#fff8'; ctx.fillRect(rx+4,H-hh-16,6,8); ctx.fillRect(rx+hw-10,H-hh-16,6,8);
  }
  ctx.fillStyle='#6cc55a'; ctx.beginPath(); ctx.moveTo(0,H);
  for (let x2=0;x2<=W+20;x2+=8) ctx.lineTo(x2,H*0.72+Math.sin((x2+camera.x*0.3)*0.018)*18);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#3a9a2a';
  for (let i=0;i<6;i++) {
    const tx=((i*95-camera.x*0.3+40)%(W+60))-30, ty=H*0.72-2;
    ctx.fillRect(tx+6,ty-14,4,14);
    ctx.beginPath(); ctx.ellipse(tx+8,ty-18,10,14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4ab83a'; ctx.beginPath(); ctx.ellipse(tx+5,ty-22,7,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a9a2a';
  }
  ctx.fillStyle='rgba(255,255,255,0.95)';
  for (let i=0;i<4;i++) {
    const cx2=((i*160+t*10)%(W+120))-60, cy2=22+i*20;
    ctx.beginPath(); ctx.ellipse(cx2,cy2,26,13,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+18,cy2-5,18,11,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2-14,cy2-3,14,9,0,0,Math.PI*2); ctx.fill();
  }
}

function drawCoinTraffic(cx2, cy, now) {
  const bob=Math.sin(now*3+cx2*0.1)*2;
  ctx.save(); ctx.translate(cx2,cy+bob); ctx.rotate(Math.sin(now*2+cx2*0.05)*0.2);
  ctx.fillStyle='#FFD700'; drawStar(0,0,8);
  ctx.fillStyle='#fff9'; drawStar(-1,-1,4);
  ctx.restore();
}

// ── Shared draw dispatchers ────────────────────────────────────────────────────
function drawTile(t, px, py, c, r) {
  if (t === 0) return;
  if (theme === 'classic') drawTileClassic(t,px,py,c,r);
  else drawTileTraffic(t,px,py,c,r);
}

function drawPlayer(p) {
  if (p.dead) {
    ctx.save(); ctx.globalAlpha = 0.8;
    ctx.translate(Math.round(p.x-camera.x+p.w/2), Math.round(p.y));
    ctx.scale(p.facingRight?1:-1, 1);
    theme==='classic' ? drawPlayerSpriteClassic(0,0,3) : drawPlayerSpriteTraffic(0,0,3);
    ctx.restore(); return;
  }
  const blink = p.invincible>0 && Math.floor(p.invincible*10)%2===0;
  if (blink) return;
  ctx.save();
  ctx.translate(Math.round(p.x-camera.x+p.w/2), Math.round(p.y));
  ctx.scale(p.facingRight?1:-1, 1);
  const frame = p.onGround ? p.walkFrame : 1;
  theme==='classic' ? drawPlayerSpriteClassic(0,0,frame) : drawPlayerSpriteTraffic(0,0,frame);
  ctx.restore();
}

function drawEnemy(en) {
  if (!en.alive) return;
  theme==='classic' ? drawEnemyClassic(en) : drawEnemyTraffic(en);
}

function drawFlag(camX) {
  theme==='classic' ? drawFlagClassic(camX) : drawFlagTraffic(camX);
}

function draw() {
  const t = Date.now() / 1000;
  theme==='classic' ? drawBackgroundClassic(t) : drawBackgroundTraffic(t);

  const c0=Math.floor(camera.x/TILE);
  const c1=Math.min(LEVEL_W-1, c0+Math.ceil(W/TILE)+1);
  for (let r=0;r<LEVEL_H;r++)
    for (let c=c0;c<=c1;c++) { const t2=map[r][c]; if(t2) drawTile(t2,c*TILE-camera.x,r*TILE,c,r); }

  if (FLAG_X-camera.x < W+40) drawFlag(camera.x);

  const now = Date.now() / 1000;
  for (const coin of coins) {
    if (coin.collected) continue;
    const cx2 = coin.cx - camera.x;
    if (cx2 < -20 || cx2 > W+20) continue;
    if (theme==='classic') drawCoinClassic(cx2, coin.cy, now);
    else drawCoinTraffic(cx2, coin.cy, now);
  }

  for (const en of enemies) drawEnemy(en);
  drawPlayer(player);

  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color;
    const s=(p.size||4)*(p.life/p.maxLife);
    ctx.fillRect(p.x-camera.x-s/2,p.y-s/2,s,s); ctx.restore();
  }
}

// ── Overlay helpers ───────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');

function showOverlay(title, msg) {
  overlay.querySelector('h1').textContent = title;
  overlay.querySelector('p').textContent = msg;
  overlay.style.display = 'flex';
}

function startGame(t) {
  theme = t;
  overlay.style.display = 'none';
  flagReached = false;
  particles = [];
  state = 'play';
  initGame();
  updateHUD();
}

document.getElementById('btn-classic').addEventListener('click', () => startGame('classic'));
document.getElementById('btn-traffic').addEventListener('click', () => startGame('traffic'));

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

state = 'menu';
initGame();
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
