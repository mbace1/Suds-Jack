<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Goo Surface</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; width:100%; height:100%; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl',{antialias:true,alpha:false})
        || canvas.getContext('experimental-webgl',{antialias:true,alpha:false});
if (!gl) { document.body.innerHTML='<p style="color:#fff;padding:2em">WebGL not supported</p>'; throw 0; }

const VS = `attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}`;

const FS = `
precision highp float;

uniform vec2  u_res;
uniform vec3  u_c0, u_c1, u_c2, u_c3;
uniform float u_sq0, u_sq1, u_sq2, u_sq3;

const vec3  HALF_BOX = vec3(0.525, 0.525, 0.525);
const float ROUND_R  = 0.200;
const float BLEND_K  = 0.340;
const vec3  LIGHT    = normalize(vec3(-0.65, 2.30, 1.70));

float sdRoundBox(vec3 p, vec3 b, float r) {
  vec3 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0) - r;
}

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

float gooCube(vec3 p, vec3 cen, float sq) {
  float sqC = clamp(sq, 0.55, 1.55);
  vec3  lp  = p - cen;
  lp.y  *= sqC;
  lp.xz /= sqrt(sqC);
  float d = sdRoundBox(lp, HALF_BOX, ROUND_R);
  return d * min(sqrt(sqC), 1.0 / sqC);
}

float scene(vec3 p) {
  float d0 = gooCube(p, u_c0, u_sq0);
  float d1 = gooCube(p, u_c1, u_sq1);
  float d2 = gooCube(p, u_c2, u_sq2);
  float d3 = gooCube(p, u_c3, u_sq3);
  return smin(smin(d0, d1, BLEND_K), smin(d2, d3, BLEND_K), BLEND_K);
}

vec3 calcNormal(vec3 p) {
  const float E = 0.0007;
  return normalize(vec3(
    scene(p+vec3(E,0,0))-scene(p-vec3(E,0,0)),
    scene(p+vec3(0,E,0))-scene(p-vec3(0,E,0)),
    scene(p+vec3(0,0,E))-scene(p-vec3(0,0,E))
  ));
}

float softShadow(vec3 ro, vec3 rd, float mint, float maxt) {
  float res = 1.0, t = mint;
  for (int i = 0; i < 20; i++) {
    if (t > maxt) break;
    float h = scene(ro + rd*t);
    if (h < 0.0004) return 0.0;
    res = min(res, 7.0*h/t);
    t  += clamp(h, 0.008, 0.25);
  }
  return clamp(res, 0.0, 1.0);
}

float calcAO(vec3 p, vec3 n) {
  float occ = 0.0, sca = 1.0;
  for (int i = 0; i < 5; i++) {
    float h = 0.010 + 0.170 * float(i) / 4.0;
    float d = scene(p + h*n);
    occ += (h - d) * sca;
    sca *= 0.80;
  }
  return clamp(1.0 - 3.0*occ, 0.0, 1.0);
}

mat3 camMatrix(vec3 ro, vec3 ta) {
  vec3 ww = normalize(ta - ro);
  vec3 uu = normalize(cross(ww, vec3(0,1,0)));
  vec3 vv = normalize(cross(uu, ww));
  return mat3(uu, vv, ww);
}

vec3 goopShade(vec3 p, vec3 N, vec3 V, float sh, float ao) {
  vec3 L = LIGHT;
  vec3 H = normalize(L + V);

  float NdL   = max(dot(N, L), 0.0);
  float NdH   = max(dot(N, H), 0.0);
  float NdV   = max(dot(N, V), 0.0);

  float specA   = pow(NdH, 88.0) * 2.60;
  float specB   = pow(NdH, 11.0) * 0.32;
  float fresnel = pow(1.0 - NdV, 3.80) * 0.62;
  float sss     = pow(max(0.0, -dot(N,L)*0.42+0.58), 2.2) * 0.42;

  vec3 col =
      vec3(0.012, 0.105, 0.045)
    + vec3(0.090, 0.460, 0.200) * NdL
    + vec3(0.850, 1.000, 0.920) * (specA + specB)
    + vec3(0.050, 0.650, 0.280) * fresnel
    + vec3(0.038, 0.680, 0.240) * sss;

  col *= (sh * 0.70 + 0.30);
  col *= (ao * 0.65 + 0.35);
  return col;
}

// Background colour for a ray (ro,rd) — floor grid or sky, ignoring goop
vec3 getBg(vec3 ro, vec3 rd, vec2 uv) {
  if (rd.y < -0.0005) {
    float tF = -ro.y / rd.y;
    if (tF > 0.0 && tF < 22.0) {
      vec3  fp   = ro + rd*tF;
      float chk  = mod(floor(fp.x) + floor(fp.z), 2.0);
      vec3  base = mix(vec3(0.055,0.062,0.072), vec3(0.068,0.076,0.088), chk*0.45);
      vec2  gf   = abs(fract(fp.xz) - 0.5);
      float grid = max(0.0, 1.0 - min(gf.x, gf.y)*95.0);
      base = mix(base, vec3(0.18,0.20,0.24), grid*0.55);
      float sh  = softShadow(fp + vec3(0,0.003,0), LIGHT, 0.05, 7.0);
      base *= (sh * 0.72 + 0.28);
      float fog = 1.0 - exp(-max(tF-4.0,0.0)*0.045);
      return mix(base, vec3(0.055,0.065,0.080), fog);
    }
  }
  return vec3(0.055,0.065,0.080) + vec3(0.010,0.012,0.018)*clamp(uv.y,0.0,1.0);
}

void main() {
  vec2 uv = (gl_FragCoord.xy - u_res*0.5) / u_res.y;

  // Zoomed-out camera — same angle, pulled back ~35%
  vec3 ro  = vec3(0.95, 3.80, 7.40);
  vec3 ta  = vec3(0.05, 0.82, 0.0);
  mat3 cam = camMatrix(ro, ta);
  vec3 rd  = cam * normalize(vec3(uv, 1.85));

  float t   = 0.10;
  bool  hit = false;
  for (int i = 0; i < 88; i++) {
    float d = scene(ro + rd*t);
    if (d < 0.0005) { hit = true; break; }
    if (t > 22.0) break;
    t += max(d, 0.004);
  }

  vec3 col;

  if (hit) {
    vec3  p  = ro + rd*t;
    vec3  N  = calcNormal(p);
    vec3  V  = -rd;
    float sh = softShadow(p + N*0.008, LIGHT, 0.02, 7.0);
    float ao = calcAO(p, N);
    vec3 surfCol = goopShade(p, N, V, sh, ao);

    // ── Translucency: Beer-Lambert absorption through gel thickness ──
    // March forward from entry point until we exit the blob
    float tX = t + 0.003;
    for (int j = 0; j < 28; j++) {
      float d = scene(ro + rd*tX);
      if (d > 0.0005) break;
      tX += max(abs(d) + 0.005, 0.005);
    }
    float thickness = tX - t;                          // ray path length inside gel
    float alpha     = 1.0 - exp(-thickness * 0.42);   // absorption (lower k = more transparent)

    // Background seen behind the gel, tinted green by the gel colour
    vec3 bgCol = getBg(ro, rd, uv);
    bgCol = mix(bgCol, vec3(0.03, 0.32, 0.12), (1.0 - alpha) * 0.55);

    col = mix(bgCol, surfCol, alpha);

  } else {
    col = getBg(ro, rd, uv);
  }

  col = col / (col + vec3(0.72));
  col = pow(col, vec3(0.4545));
  gl_FragColor = vec4(col, 1.0);
}
`;

// ── Compile & link ────────────────────────────────────────────────────────────

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const vbuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {};
['u_res','u_c0','u_c1','u_c2','u_c3','u_sq0','u_sq1','u_sq2','u_sq3']
  .forEach(n => U[n] = gl.getUniformLocation(prog, n));

// ── Physics ───────────────────────────────────────────────────────────────────

class GooCube {
  constructor(bx, by, bz) {
    this.bx=bx; this.by=by; this.bz=bz;
    this.x=bx;  this.y=by;  this.z=bz;
    this.vx=0;  this.vy=0;  this.vz=0;
    this.sq=1.0; this.sqV=0.0;
  }
  tick() {
    this.vx=(this.vx+(this.bx-this.x)*0.022)*0.89;
    this.vy=(this.vy+(this.by-this.y)*0.022)*0.89;
    this.vz=(this.vz+(this.bz-this.z)*0.022)*0.89;
    this.x+=this.vx; this.y+=this.vy; this.z+=this.vz;
    this.sqV=(this.sqV-(this.sq-1.0)*0.24)*0.86;
    this.sq=Math.max(0.55, Math.min(1.60, this.sq+this.sqV));
  }
  hit(str) {
    this.sqV -= str * 0.85;
    this.vy  -= str * 0.10;
  }
}

// Trefoil base + 1 top, matching reference arrangement
const BY=0.525, TY=1.500, SP=0.640;
const cubes = [
  new GooCube(-SP,  BY,  0.310),   // front-left
  new GooCube( SP,  BY,  0.310),   // front-right
  new GooCube( 0.0, BY, -0.490),   // back-centre
  new GooCube( 0.0, TY,  0.050),   // top
];

// ── Input ─────────────────────────────────────────────────────────────────────

function applyHit() {
  const base = 0.20 + Math.random()*0.12;
  cubes[0].hit(base);
  cubes[1].hit(base*0.92);
  cubes[2].hit(base*0.88);
  cubes[3].hit(base*0.60);
}
canvas.addEventListener('pointerdown', applyHit);
canvas.addEventListener('touchstart', e=>{e.preventDefault();applyHit();},{passive:false});

// ── Resize ────────────────────────────────────────────────────────────────────

let W, H;
function resize() {
  const dpr = Math.min(window.devicePixelRatio||1, 1.5);
  W=canvas.width  = Math.round(window.innerWidth *dpr);
  H=canvas.height = Math.round(window.innerHeight*dpr);
  gl.viewport(0,0,W,H);
}
resize();
window.addEventListener('resize', resize);

// ── Render loop ───────────────────────────────────────────────────────────────

function frame() {
  requestAnimationFrame(frame);
  cubes.forEach(c=>c.tick());
  gl.uniform2f(U.u_res, W, H);
  gl.uniform3f(U.u_c0, cubes[0].x, cubes[0].y, cubes[0].z);
  gl.uniform3f(U.u_c1, cubes[1].x, cubes[1].y, cubes[1].z);
  gl.uniform3f(U.u_c2, cubes[2].x, cubes[2].y, cubes[2].z);
  gl.uniform3f(U.u_c3, cubes[3].x, cubes[3].y, cubes[3].z);
  gl.uniform1f(U.u_sq0, cubes[0].sq);
  gl.uniform1f(U.u_sq1, cubes[1].sq);
  gl.uniform1f(U.u_sq2, cubes[2].sq);
  gl.uniform1f(U.u_sq3, cubes[3].sq);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
frame();
</script>
</body>
</html>
