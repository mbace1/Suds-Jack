<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Paper Route — 2D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #2a6b4a; overflow: hidden; touch-action: none; }
    #game { display: block; image-rendering: pixelated; }
    #overlay {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #fff; font-family: monospace; text-align: center; pointer-events: none;
      text-shadow: 0 2px 0 #1c2b22, 0 0 14px rgba(0,0,0,0.5);
      display: none; line-height: 1.35; user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="overlay"></div>
  <script type="module" src="js/main.js?v=1"></script>
</body>
</html>
