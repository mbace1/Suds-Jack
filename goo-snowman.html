<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Goo Snowman</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; width:100%; height:100%; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', {antialias:true, alpha:false})
        || canvas.getContext('experimental-webgl', {antialias:true, alpha:false});

if (!gl) {
  document.body.innerHTML = '<p style="color:#fff;padding:2em">WebGL not supported</p>';
  throw new Error('no webgl');
}

// ── Shaders ───────────────────────────────────────────────────────────────────

const VS = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const FS = `
precision highp float;

uniform vec2  u_res;
uniform vec2  u_c0, u_c1, u_c2;
uniform float u_r0, u_r1, u_r2;
uniform vec2  u_sh;
uniform float u_shR;

float field(vec2 p) {
  vec2 d0 = p - u_c0; float f0 = u_r0*u_r0 / (dot(d0,d0) + 0.5);
  vec2 d1 = p - u_c1; float f1 = u_r1*u_r1 / (dot(d1,d1) + 0.5);
  vec2 d2 = p - u_c2; float f2 = u_r2*u_r2 / (dot(d2,d2) + 0.5);
  return f0 + f1 + f2;
}

vec3 surfaceNormal(vec2 p) {
  vec3 n = vec3(0.0);

  vec2 d0 = p - u_c0; float dsq0 = dot(d0,d0); float rsq0 = u_r0*u_r0;
  if (dsq0 < rsq0) {
    float zn = sqrt(rsq0 - dsq0);
    float w = rsq0 / (dsq0 + 0.5);
    n += vec3(d0, zn) * (w / u_r0);
  }

  vec2 d1 = p - u_c1; float dsq1 = dot(d1,d1); float rsq1 = u_r1*u_r1;
  if (dsq1 < rsq1) {
    float zn = sqrt(rsq1 - dsq1);
    float w = rsq1 / (dsq1 + 0.5);
    n += vec3(d1, zn) * (w / u_r1);
  }

  vec2 d2 = p - u_c2; float dsq2 = dot(d2,d2); float rsq2 = u_r2*u_r2;
  if (dsq2 < rsq2) {
    float zn = sqrt(rsq2 - dsq2);
    float w = rsq2 / (dsq2 + 0.5);
    n += vec3(d2, zn) * (w / u_r2);
  }

  return (dot(n,n) > 0.0001) ? normalize(n) : vec3(0.0, 0.0, 1.0);
}

void main() {
  vec2 p = gl_FragCoord.xy;
  float f = field(p);

  // Background
  if (f < 1.0) {
    vec3 bg = vec3(0.016, 0.026, 0.052);

    // Nearfield glow
    bg += vec3(0.0, 0.055, 0.018) * (f * f * 0.65);

    // Ground shadow ellipse
    vec2 sd = (p - u_sh) / vec2(u_shR * 6.5, u_shR * 0.85);
    float sdist = dot(sd, sd);
    bg *= 1.0 - (1.0 - smoothstep(0.0, 1.2, sdist)) * 0.58;

    gl_FragColor = vec4(bg, 1.0);
    return;
  }

  // Surface
  vec3 N = surfaceNormal(p);
  vec3 L = normalize(vec3(-0.56, 0.83, 0.80));
  vec3 V = vec3(0.0, 0.0, 1.0);
  vec3 H = normalize(L + V);

  float NdL = dot(N, L);
  float NdV = dot(N, V);
  float NdH = dot(N, H);

  float diff    = max(NdL, 0.0);
  float specA   = pow(max(NdH, 0.0), 96.0);
  float specB   = pow(max(NdH, 0.0), 12.0) * 0.30;
  float fresnel = pow(1.0 - max(NdV, 0.0), 3.2);
  float sss     = pow(max(-NdL * 0.5 + 0.5, 0.0), 2.2) * 0.40;

  // AO darkens at neck junctions where field density is highest
  float ao = 1.0 - clamp((f - 1.0) * 0.013, 0.0, 0.40);

  vec3 baseCol = vec3(0.012, 0.055, 0.018);
  vec3 diffCol = vec3(0.10,  0.56,  0.18) * diff;
  vec3 specCol = vec3(0.72,  1.00,  0.82) * (specA * 3.0 + specB);
  vec3 rimCol  = vec3(0.00,  0.78,  0.36) * fresnel * 0.52;
  vec3 sssCol  = vec3(0.04,  0.92,  0.26) * sss;

  vec3 col = (baseCol + diffCol + sssCol) * ao + specCol + rimCol;

  // Reinhard tonemap + gamma
  col = col / (col + vec3(0.75));
  col = pow(col, vec3(1.0 / 2.2));

  gl_FragColor = vec4(col, 1.0);
}
`;

// ── Compile & link ────────────────────────────────────────────────────────────

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {};
['u_res','u_c0','u_c1','u_c2','u_r0','u_r1','u_r2','u_sh','u_shR']
  .forEach(n => { U[n] = gl.getUniformLocation(prog, n); });

// ── Spring physics ────────────────────────────────────────────────────────────

const NP = 24;
const COS = new Float32Array(NP);
const SIN = new Float32Array(NP);
for (let i = 0; i < NP; i++) {
  const a = (i / NP) * Math.PI * 2;
  COS[i] = Math.cos(a);
  SIN[i] = Math.sin(a);
}

class GooBall {
  constructor(bx, by, r) {
    this.bx = bx; this.by = by; this.r = r;
    this.x  = bx; this.y  = by;
    this.vx = 0;  this.vy = 0;
    this.off = new Float32Array(NP);
    this.vel = new Float32Array(NP);
  }

  tick() {
    const dx = this.bx - this.x, dy = this.by - this.y;
    this.vx = (this.vx + dx * 0.018) * 0.91;
    this.vy = (this.vy + dy * 0.018) * 0.91;
    this.x += this.vx;
    this.y += this.vy;
    for (let i = 0; i < NP; i++) {
      this.vel[i] = (this.vel[i] - this.off[i] * 0.22) * 0.88;
      this.off[i] += this.vel[i];
    }
  }

  hit(tx, ty, str) {
    const dx = tx - this.x, dy = ty - this.y;
    const d  = Math.sqrt(dx*dx + dy*dy) || 1;
    for (let i = 0; i < NP; i++) {
      const px = this.x + COS[i] * this.r;
      const py = this.y + SIN[i] * this.r;
      const ex = px - tx, ey = py - ty;
      const ed = Math.sqrt(ex*ex + ey*ey) || 1;
      this.vel[i] += str * Math.exp(-ed / (this.r * 4.5));
    }
    const body = str * 0.28 * Math.exp(-d / (this.r * 3));
    this.vx += (dx / d) * body;
    this.vy += (dy / d) * body;
  }

  // Effective radius = base + mean radial deformation (used for shader radius uniform)
  er() {
    let s = 0;
    for (let i = 0; i < NP; i++) s += this.off[i];
    return this.r + s / NP;
  }
}

// ── Layout ────────────────────────────────────────────────────────────────────

let W, H, balls;

function layout() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  gl.viewport(0, 0, W, H);

  const cx = W * 0.5;
  const r0 = Math.min(W, H) * 0.22;
  const r1 = r0 * 0.72;
  const r2 = r0 * 0.52;
  const y0 = H * 0.80 - r0 * 0.1;

  balls = [
    new GooBall(cx, y0,                                        r0),
    new GooBall(cx, y0 - (r0 + r1) * 0.82,                    r1),
    new GooBall(cx, y0 - (r0 + r1) * 0.82 - (r1 + r2) * 0.81, r2),
  ];
}

layout();
window.addEventListener('resize', layout);

// ── Input ─────────────────────────────────────────────────────────────────────

function applyHit(px, py) {
  balls.forEach(b => b.hit(px, py, 14.0));
}

canvas.addEventListener('pointerdown', e => applyHit(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) applyHit(t.clientX, t.clientY);
}, { passive: false });

// ── Render loop ───────────────────────────────────────────────────────────────

function frame() {
  requestAnimationFrame(frame);

  balls.forEach(b => b.tick());

  const [b0, b1, b2] = balls;

  gl.uniform2f(U.u_res, W, H);

  // Y-flip: screen Y is down, WebGL Y is up
  gl.uniform2f(U.u_c0, b0.x, H - b0.y);
  gl.uniform2f(U.u_c1, b1.x, H - b1.y);
  gl.uniform2f(U.u_c2, b2.x, H - b2.y);

  gl.uniform1f(U.u_r0, b0.er());
  gl.uniform1f(U.u_r1, b1.er());
  gl.uniform1f(U.u_r2, b2.er());

  // Shadow below bottom ball
  gl.uniform2f(U.u_sh, b0.x, H - (b0.y + b0.r * 0.62));
  gl.uniform1f(U.u_shR, b0.r * 0.55);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

frame();
</script>
</body>
</html>
