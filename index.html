<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suds Jack — Vector Arcade Shooter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-score">SCORE: <span id="scoreDisplay">0</span></div>
    <div class="hud-level">LEVEL <span id="levelDisplay">1</span></div>
    <div class="hud-lives">LIVES: <span id="livesDisplay">❤ ❤ ❤</span></div>
  </div>

  <div id="overlay">
    <h1 id="overlayTitle" style="color:#0ff; text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;">SUDS JACK</h1>
    <p id="overlaySubtitle" style="color:#f0f; text-shadow: 0 0 10px #f0f;">VECTOR TUBE SHOOTER</p>
    <p id="overlayInstructions" style="color:#ff0; text-shadow: 0 0 10px #ff0; margin-top:30px;">← → or A/D : MOVE &nbsp;&nbsp; SPACE : SHOOT</p>
    <p style="color:#0ff; text-shadow: 0 0 10px #0ff; margin-top:8px;">Z : SUPERZAPPER &nbsp;&nbsp; ENTER : START</p>
  </div>

  <!-- link to the SKLTR demo (minimalist RoR2-style roguelike) -->
  <a href="Skltr/" id="skltrLink" style="position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
     z-index:100; font-family:monospace; font-size:16px; letter-spacing:1px; color:#0f0; text-decoration:none;
     border:1px solid #0f0; border-radius:8px; padding:10px 16px; background:rgba(0,0,0,0.55);
     text-shadow:0 0 8px #0f0; box-shadow:0 0 14px rgba(0,255,80,.5);">▶ PLAY SKLTR</a>

  <script src="game.js"></script>
</body>
</html>
