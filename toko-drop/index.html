<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Toko Drop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    #canvas-game { display: block; }
    #canvas-ui {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
    }
    #overlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 24px #ff4422, 0 0 60px #aa00ff;
      display: none;
      line-height: 1.3;
      user-select: none;
    }
    #design-link {
      position: fixed;
      top: 10px; right: 12px;
      font-family: monospace;
      font-size: 11px;
      color: #445;
      text-decoration: none;
      z-index: 10;
      pointer-events: auto;
      letter-spacing: 0.06em;
    }
    #design-link:hover { color: #6688aa; }
  </style>
</head>
<body>
  <canvas id="canvas-game"></canvas>
  <canvas id="canvas-ui"></canvas>
  <div id="overlay"></div>
  <a id="design-link" href="enemy-designer.html">design →</a>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
