<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Toko Drop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: #000; overflow: hidden; touch-action: none; }
    #canvas-game { display: block; }
    #canvas-ui {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
    }
    #overlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      /* Short/landscape screens: cap to the viewport and scroll inside instead
         of cropping top+bottom (body overflow is hidden, so this is the only
         way tall screens like game-over/feedback stay reachable). */
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100svh;
      overflow-y: auto;
      overflow-x: hidden;
      touch-action: pan-y;
      /* Scrollable but chromeless: a visible scrollbar drew a stray vertical
         line on the title screen and its gutter squeezed the centered layout. */
      scrollbar-width: none;
      overscroll-behavior: contain;
      padding: 10px 14px;
      color: #fff;
      font-family: monospace, sans-serif;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 24px #ff4422, 0 0 60px #aa00ff;
      display: none;
      line-height: 1.3;
      user-select: none;
    }
    #overlay::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <canvas id="canvas-game"></canvas>
  <canvas id="canvas-ui"></canvas>
  <div id="overlay"></div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js?v=47"></script>
</body>
</html>
