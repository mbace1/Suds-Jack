<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Hyper Dagger — Voxel Lab</title>
  <link rel="icon" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; color: #e8e8e8; }
    #canvas { display: block; }
    #panel {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 300px;
      padding: 14px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.82);
      border-right: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 12px;
      line-height: 1.6;
    }
    h1 { font-size: 15px; letter-spacing: 3px; margin-bottom: 2px; }
    .sub { color: #9a9a9a; font-size: 11px; margin-bottom: 12px; }
    .sec { color: #c81e1e; letter-spacing: 2px; margin: 12px 0 4px; font-size: 11px; }
    select, button, input[type=text], textarea {
      font-family: monospace;
      font-size: 12px;
      color: #f0f0f0;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 5px;
      padding: 4px 8px;
    }
    select { width: 100%; }
    button { cursor: pointer; margin: 2px 2px 2px 0; }
    button:hover { background: rgba(255, 255, 255, 0.16); }
    button.on { border-color: #c81e1e; background: rgba(200, 30, 30, 0.3); }
    .pal-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .pal-row b { width: 14px; color: #fff; }
    .pal-row input[type=color] {
      width: 44px; height: 22px; padding: 0;
      background: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
    }
    .pal-row input.glow { width: 52px; }
    .pal-row span { color: #8a8a8a; font-size: 10px; }
    #stats { color: #9a9a9a; margin-top: 8px; font-size: 11px; }
    textarea {
      width: 100%; height: 150px;
      white-space: pre; resize: vertical;
      font-size: 11px; line-height: 1.4;
    }
    #hint { color: #6a6a6a; font-size: 10px; margin-top: 10px; }
    a { color: #c81e1e; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="panel">
    <h1>VOXEL LAB</h1>
    <div class="sub">hyper dagger model &amp; style workbench</div>

    <div class="sec">MODEL</div>
    <select id="model"></select>

    <div class="sec">DETAIL</div>
    <div id="detail"></div>

    <div class="sec">PALETTE <span style="color:#6a6a6a">(glow &gt; 1 = HDR bloom)</span></div>
    <div id="palette"></div>

    <div class="sec">TEST</div>
    <button id="chip">CHIP</button><button id="burst">BURST</button><button id="flash">FLASH</button><button id="spin" class="on">SPIN</button><button id="bloom" class="on">BLOOM</button>

    <div class="sec">LAYERS <span style="color:#6a6a6a">(bottom slice first · row 0 = front)</span></div>
    <textarea id="layers" spellcheck="false"></textarea>
    <div><button id="apply">APPLY LAYERS</button><button id="revert">REVERT</button></div>

    <div class="sec">EXPORT</div>
    <button id="export">COPY MODEL JSON</button>
    <div id="stats"></div>
    <div id="hint">drag = orbit &middot; wheel = zoom &middot; new letters in LAYERS
    auto-add white palette rows &middot; paste exported JSON into
    <b>js/voxel.js</b> MODELS &middot; <a href="index.html">&larr; back to the game</a></div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.min.js",
      "three/addons/": "./vendor/jsm/"
    }
  }
  </script>
  <script type="module" src="js/voxel-lab.js?v=32"></script>
</body>
</html>
